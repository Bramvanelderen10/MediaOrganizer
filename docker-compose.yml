services:
  media-organizer:
    image: ghcr.io/bramvanelderen10/mediaorganizer:main
    container_name: media-organizer
    ports:
      - "45263:45263"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - TZ=Europe/Amsterdam
      - MediaOrganizer__SourceFolder=/media
      - MediaOrganizer__MoveHistoryDatabasePath=/data/move-history.db
      # Match these to the UID/GID of the host user that owns your media files.
      # This ensures moved files are not owned by root, preventing SMB lock-out.
      # Run `id` on your host to find the right values.
      - PUID=1000
      - PGID=1000
    restart: unless-stopped
    volumes:
      # Keeping both under one mount ensures moves are fast renames (same filesystem).
      - /path/to/your/videos:/media
      # Persist the SQLite move-history database on the host
      - media-organizer-data:/data
    networks:
      - local-network

volumes:
  media-organizer-data:


networks:
  local-network:
    driver: bridge
